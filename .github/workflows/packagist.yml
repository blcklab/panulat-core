name: Packagist Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-check:
    name: Release check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, pdo, pdo_mysql, pdo_sqlite, mbstring
          coverage: none
          tools: composer:v2

      - name: Validate Composer
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Static analysis
        run: composer stan

      - name: PHPUnit tests
        run: composer test

  update-packagist:
    name: Update Packagist
    runs-on: ubuntu-latest
    needs: release-check

    steps:
      - name: Trigger Packagist update
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$PACKAGIST_USERNAME" ] || [ -z "$PACKAGIST_API_TOKEN" ]; then
            echo "Packagist secrets are not set. Skipping Packagist API update."
            exit 0
          fi

          curl --fail-with-body -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${PACKAGIST_USERNAME}:${PACKAGIST_API_TOKEN}" \
            "https://packagist.org/api/update-package" \
            -d "{\"repository\":\"${REPOSITORY_URL}\"}"
